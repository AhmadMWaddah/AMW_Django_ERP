{% extends "layouts/dashboard.html" %}

{% block title %}Sales Orders - {{ app_name }}{% endblock %}
{% block topbar_title %}Sales Orders{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by order # or customer..." class="form-group__input" style="max-width: 400px;">
    <select name="status" class="form-group__input" style="max-width: 180px;">
        <option value="">All Status</option>
        <option value="DRAFT" {% if status_filter == "DRAFT" %}selected{% endif %}>Draft</option>
        <option value="CONFIRMED" {% if status_filter == "CONFIRMED" %}selected{% endif %}>Confirmed</option>
        <option value="SHIPPED" {% if status_filter == "SHIPPED" %}selected{% endif %}>Shipped</option>
        <option value="VOIDED" {% if status_filter == "VOIDED" %}selected{% endif %}>Voided</option>
    </select>
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query or status_filter %}<a href="{% url 'Sales:OrderList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
