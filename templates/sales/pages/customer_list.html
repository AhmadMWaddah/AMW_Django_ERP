{% extends "layouts/dashboard.html" %}

{% block title %}Customers - {{ app_name }}{% endblock %}
{% block topbar_title %}Sales - Customers{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by name, email, or category..." class="form-group__input" style="max-width: 400px;">
    <select name="category" class="form-group__input" style="max-width: 200px;">
        <option value="">All Categories</option>
        {% for cat in categories %}
        <option value="{{ cat.slug }}" {% if category_filter == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query or category_filter %}<a href="{% url 'Sales:CustomerList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
