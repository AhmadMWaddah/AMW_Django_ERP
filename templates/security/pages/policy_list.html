{% extends "layouts/dashboard.html" %}

{% block title %}Policies - {{ app_name }}{% endblock %}
{% block topbar_title %}IAM - Policies{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by name or resource..." class="form-group__input" style="max-width: 400px;">
    <select name="effect" class="form-group__input" style="max-width: 150px;">
        <option value="">All Effects</option>
        <option value="allow" {% if effect_filter == "allow" %}selected{% endif %}>Allow</option>
        <option value="deny" {% if effect_filter == "deny" %}selected{% endif %}>Deny</option>
    </select>
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query or effect_filter %}<a href="{% url 'Security:PolicyList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
