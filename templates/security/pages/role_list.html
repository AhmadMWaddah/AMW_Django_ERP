{% extends "layouts/dashboard.html" %}

{% block title %}Roles - {{ app_name }}{% endblock %}
{% block topbar_title %}IAM - Roles{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by name or department..." class="form-group__input" style="max-width: 500px;">
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query %}<a href="{% url 'Security:RoleList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
