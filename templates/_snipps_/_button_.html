{# comment #}
AMW Django ERP - Button Snippet
Usage: include "_snipps_/_button_.html" with text="Save" type="submit" class="btn btn--primary" only
Button variants via class: btn btn--primary, btn btn--outline, btn btn--danger, btn btn--sm
{# endcomment #}
<button type="{{ type|default:'button' }}" class="btn {{ class|default:'' }}" {% if name %}name="{{ name }}" {% endif %}
    {% if disabled %}disabled{% endif %}>
    {{ text }}
</button>
