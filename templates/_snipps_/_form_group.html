{# -- AMW Django ERP - Form Group Snippet -- #}
{# Constitution Section 7.2: Template Hierarchy - Global Atoms #}
{#
  Usage:
    {% include '_snipps_/_form_group.html' with name="email" label="Email Address" type="email" placeholder="you@example.com" required=True %}
#}

<div class="accounts-form-group">
    <label for="{{ name }}">{{ label }}</label>
    <input 
        type="{{ type|default:'text' }}" 
        id="{{ name }}" 
        name="{{ name }}" 
        {% if required %}required{% endif %}
        {% if autofocus %}autofocus{% endif %}
        placeholder="{{ placeholder|default:'' }}"
        value="{{ value|default:'' }}"
    >
</div>
