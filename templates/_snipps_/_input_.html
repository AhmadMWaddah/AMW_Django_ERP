{# -- AMW Django ERP - Input Field Snippet -- #}
{# Constitution Section 7.2: Template Hierarchy - Global Atoms #}
{# Expected context keys: field_id, label, input_type, name, placeholder, autocomplete, required, autofocus #}

<div class="accounts-form-group">
    <label for="{{ field_id|default:name }}">{{ label }}</label>
    <input
        type="{{ input_type|default:'text' }}"
        id="{{ field_id|default:name }}"
        name="{{ name }}"
        {% if required|default:False %}required{% endif %}
        {% if autofocus|default:False %}autofocus{% endif %}
        {% if autocomplete|default:'' %}autocomplete="{{ autocomplete }}"{% endif %}
        placeholder="{{ placeholder|default:'' }}"
    >
</div>
