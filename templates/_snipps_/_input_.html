{# -- AMW Django ERP - Input Snippet -- #}
<div class="form-group">
    <label for="{{ field_id }}" class="form-group__label">
        {{ label|default:'' }}{% if required %} *{% endif %}
    </label>
    <input type="{{ input_type|default:'text' }}" id="{{ field_id|default:'' }}" name="{{ name|default:'' }}" class="form-group__input{% if errors %} form-group__input--error{% endif %}" placeholder="{{ placeholder|default:'' }}" value="{{ value|default:'' }}"{% if autocomplete %} autocomplete="{{ autocomplete }}"{% endif %}{% if required %} required{% endif %}{% if autofocus %} autofocus{% endif %}>
    {% if errors %}
    {% include "_snipps_/_field_error_.html" with errors=errors only %}
    {% endif %}
</div>
