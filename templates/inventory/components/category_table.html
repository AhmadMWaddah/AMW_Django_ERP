{# -- Inventory - Category Table Rows -- #}
{# Receives: categories (queryset) #}

<thead>
    <tr>
        <th>Name</th>
        <th>Slug</th>
        <th>Parent</th>
        <th>Products</th>
        <th>Actions</th>
    </tr>
</thead>
<tbody>
{% for cat in categories %}
<tr>
    <td><strong>{{ cat.name }}</strong></td>
    <td class="u-text-xs"><code>{{ cat.slug }}</code></td>
    <td class="u-text-xs">{{ cat.parent.name|default:"-" }}</td>
    <td class="u-text-xs">{{ cat.products.count }}</td>
    <td>-</td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="u-text-center u-py-lg u-text-muted">No categories found.</td>
</tr>
{% endfor %}
</tbody>
