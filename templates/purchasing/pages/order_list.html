{% extends "layouts/dashboard.html" %}

{% block title %}Purchase Orders - {{ app_name }}{% endblock %}
{% block topbar_title %}Purchase Orders{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by PO # or supplier..." class="form-group__input" style="max-width: 400px;">
    <select name="status" class="form-group__input" style="max-width: 180px;">
        <option value="">All Status</option>
        <option value="DRAFT" {% if status_filter == "DRAFT" %}selected{% endif %}>Draft</option>
        <option value="ISSUED" {% if status_filter == "ISSUED" %}selected{% endif %}>Issued</option>
        <option value="IN_PROGRESS" {% if status_filter == "IN_PROGRESS" %}selected{% endif %}>In-Progress</option>
        <option value="COMPLETED" {% if status_filter == "COMPLETED" %}selected{% endif %}>Completed</option>
        <option value="CANCELLED" {% if status_filter == "CANCELLED" %}selected{% endif %}>Cancelled</option>
    </select>
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query or status_filter %}<a href="{% url 'Purchasing:OrderList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
