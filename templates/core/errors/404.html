{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AMW Django ERP</title>
    <link rel="stylesheet" href="{% static 'styles/_variables.css' %}">
    <link rel="stylesheet" href="{% static 'styles/_base.css' %}">
    <link rel="stylesheet" href="{% static 'styles/_utilities.css' %}">
    <link rel="stylesheet" href="{% static 'styles/errors.css' %}">
</head>

<body>
    <div class="error-page">
        <div class="card u-text-center" style="max-width: 500px;">
            <div class="card__body">
                <h1 class="error-code">404</h1>
                <h2 class="u-mt-sm">Page Not Found</h2>
                <p class="u-text-muted u-mt-sm u-mb-md">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <a href="{% url 'Accounts:Dashboard' %}" class="btn btn--primary">Go to Dashboard</a>
            </div>
        </div>
    </div>
</body>

</html>
