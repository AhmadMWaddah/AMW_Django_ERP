{% load static %}<!DOCTYPE html>
<html lang="en">
<!-- -- AMW Django ERP - Dashboard Page -- -->
<!-- -- Constitution Section 7.2: templates/<module>/pages/ -- -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AMW Django ERP</title>
    
    <!-- -- External Stylesheet (Constitution Section 7.3) -- -->
    <link rel="stylesheet" href="{% static 'styles/accounts.css' %}">
</head>
<body class="accounts-dashboard-page">
    <div class="accounts-dashboard-header">
        <h1>Welcome, {{ user.get_full_name }}!</h1>
    </div>
    
    <!-- -- User Info -- -->
    <div class="accounts-dashboard-info">
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Role:</strong> {% if user.is_staff %}Administrator{% else %}Employee{% endif %}</p>
    </div>
    
    <!-- -- Logout Form (using _snipps_) -- -->
    <form method="post" action="{% url 'accounts:logout' %}">
        {% csrf_token %}
        {% include '_snipps_/_button_.html' with text="Logout" type="submit" class="accounts-logout-btn" %}
    </form>
</body>
</html>
