{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AMW Django ERP</title>
    
    <link rel="stylesheet" href="{% static 'styles/accounts.css' %}">
</head>
<body class="accounts-dashboard-page">
    <div class="accounts-dashboard-header">
        <h1>Welcome, {{ user.get_full_name }}!</h1>
    </div>
    
    <div class="accounts-dashboard-info">
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Role:</strong> {% if user.is_staff %}Administrator{% else %}Employee{% endif %}</p>
    </div>
    
    <form method="post" action="{% url 'Accounts:Logout' %}">
        {% csrf_token %}
        {% include '_snipps_/_button_.html' with text="Logout" type="submit" class="accounts-logout-btn" %}
    </form>
</body>
</html>
