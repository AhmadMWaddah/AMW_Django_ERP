{% extends "layouts/dashboard.html" %}

{% block title %}Employees - {{ app_name }}{% endblock %}
{% block topbar_title %}Identity - Employees{% endblock %}

{% block dashboard_content %}
<div id="main-content">
<form method="get" class="u-flex u-gap-sm u-mb-md">
    <input type="text" name="q" value="{{ query }}" placeholder="Search by name or email..." class="form-group__input" style="max-width: 500px;">
    <select name="department" class="form-group__input" style="max-width: 200px;">
        <option value="">All Departments</option>
        {% for dept in departments %}
        <option value="{{ dept.slug }}" {% if dept_filter == dept.slug %}selected{% endif %}>{{ dept.name }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn--primary">Search</button>
    {% if query or dept_filter %}<a href="{% url 'Accounts:EmployeeList' %}" class="btn btn--outline">Clear</a>{% endif %}
</form>

{% include "components/table_frame.html" %}
</div>
{% endblock %}
