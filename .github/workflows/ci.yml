# -- AMW Django ERP - CI/CD Pipeline --
# Constitution Section 14: CI Law
# No PR shall be merged unless the CI Defender is Green.

name: CI/CD Pipeline

on:
  push:
    branches: [master, phase-*]
  pull_request:
    branches: [master, phase-*]

jobs:
  # -- Job 1: Lint Check --
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff (enforce import sorting)
        run: |
          python -m ruff check . --fix

      - name: Run Black (check mode)
        run: |
          python -m black --check .

  # -- Job 2: Test Suite --
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: amw_django_erp_test
          POSTGRES_USER: amw_erp_user
          POSTGRES_PASSWORD: amw_erp_password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migration Safety Gate
        run: |
          python manage.py makemigrations --check --dry-run --settings=config.settings.dev

      - name: Create test .env file
        run: |
          cat > .env << EOF
          DJANGO_SECRET_KEY=test-secret-key-for-ci-only
          DJANGO_DEBUG=True
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.postgresql
          DB_NAME=amw_django_erp_test
          DB_USER=amw_erp_user
          DB_PASSWORD=amw_erp_password_test
          DB_HOST=localhost
          DB_PORT=5432
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run migrations
        run: |
          python manage.py migrate --settings=config.settings.dev

      - name: Run pytest with coverage
        run: |
          python -m pytest --tb=short -v --cov=. --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # -- Job 3: Django Check --
  django-check:
    name: Django System Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django check
        run: |
          python manage.py check --settings=config.settings.dev

      - name: Run Django check (production)
        run: |
          python manage.py check --deploy --settings=config.settings.prod

  # -- Job 4: Build Verification --
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t amw-django-erp:${{ github.sha }} .

      - name: Verify Docker image functionality
        run: |
          docker run --rm amw-django-erp:${{ github.sha }} python manage.py check --settings=config.settings.prod

      - name: List built images
        run: |
          docker images amw-django-erp:${{ github.sha }}
