# -- AMW Django ERP - Production Docker Compose --
# Production-ready stack with PostgreSQL, Redis, Django, and Celery
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # -- Django Web Application --
  web:
    image: ahmadmwaddah/amw-django-erp-docker:latest
    container_name: amw_erp_prod_web
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - amw_erp_network

  # -- Celery Worker --
  celery_worker:
    image: ahmadmwaddah/amw-django-erp-docker:latest
    container_name: amw_erp_prod_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - redis
      - postgres
    networks:
      - amw_erp_network

  # -- Celery Beat (Scheduled Tasks) --
  celery_beat:
    image: ahmadmwaddah/amw-django-erp-docker:latest
    container_name: amw_erp_prod_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - redis
    networks:
      - amw_erp_network

  # -- PostgreSQL Database --
  postgres:
    image: postgres:15-alpine
    container_name: amw_erp_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amw_django_erp
      POSTGRES_USER: amw_erp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF-8"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amw_erp_user -d amw_django_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amw_erp_network

  # -- Redis Cache / Message Broker --
  redis:
    image: redis:7-alpine
    container_name: amw_erp_prod_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amw_erp_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  amw_erp_network:
    driver: bridge